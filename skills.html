<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Skills</title>

<style>
body {
  font-family: "Times New Roman", serif;
  margin: 0;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at top, rgba(96,165,250,0.25), transparent 60%),
    linear-gradient(to bottom, #020617, #0f172a);
  z-index: -2;
}

/* BINTANG HALUS */
.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.12;
}

/* ⭐ BINTANG JATUH */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
}

.star {
  position: absolute;
  width: 2px;
  height: 100px;
  background: linear-gradient(white, transparent);
  transform: rotate(45deg);
  animation: fall linear infinite;
}

@keyframes fall {
  0% {
    transform: translateY(-100px) translateX(0) rotate(45deg);
    opacity: 1;
  }
  100% {
    transform: translateY(900px) translateX(300px) rotate(45deg);
    opacity: 0;
  }
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(20px);
}

nav ul {
  display: flex;
  gap: 25px;
}

nav a {
  color: white;
  text-decoration: none;
  opacity: 0.8;
}

nav a:hover {
  color: #60a5fa;
}

/* SECTION */
section {
  padding: 120px 20px;
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

/* JUDUL */
h1 {
  font-size: 55px;
  background: linear-gradient(to right, #fff, #93c5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* DESKRIPSI */
.desc {
  max-width: 650px;
  margin: auto;
  margin-bottom: 70px;
  opacity: 0.8;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  padding: 35px;
  margin: 15px;
  border-radius: 30px;
  display: inline-block;
  width: 260px;
  cursor: pointer;
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 30px rgba(96,165,250,0.5);
}

/* FOTO */
.foto-container {
  display: flex;
  justify-content: center;
  gap: 50px;
  margin-top: 80px;
  flex-wrap: wrap;
}

.foto-box img {
  width: 300px;
  border-radius: 25px;
}

/* MODAL APPLE STYLE */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(255,255,255,0.08);
  padding: 40px;
  border-radius: 30px;
  backdrop-filter: blur(20px);
  transform: translateY(100px);
  opacity: 0;
  transition: 0.5s;
  max-width: 400px;
  text-align: center;
}

.modal.show .modal-content {
  transform: translateY(0);
  opacity: 1;
}

.close {
  margin-top: 20px;
  cursor: pointer;
  color: #60a5fa;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="stars" id="stars"></div>

<nav>
  <h2>Fitri Sayidah</h2>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Skills</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<section>

<h1>My Skills</h1>

<p class="desc">
Saya menggabungkan komunikasi dan kreativitas visual untuk menciptakan pengalaman yang berkesan.
</p>

<div class="card" onclick="openModal('design')">🎨 Desain & Menggambar</div>
<div class="card" onclick="openModal('mc')">🎤 Public Speaking</div>

<div class="foto-container">
  <img src="foto G2.jpeg">
  <img src="foto G3.jpeg">
</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <div class="close" onclick="closeModal()">Tutup</div>
  </div>
</div>

<script>
// ⭐ BINTANG
const starsContainer = document.getElementById("stars");

setInterval(() => {
  const star = document.createElement("div");
  star.classList.add("star");
  star.style.left = Math.random()*window.innerWidth+"px";
  star.style.animationDuration = (Math.random()*3+2)+"s";
  starsContainer.appendChild(star);
  setTimeout(()=>star.remove(),5000);
},250);

// MODAL
function openModal(type){
  const modal = document.getElementById("modal");
  const title = document.getElementById("title");
  const desc = document.getElementById("desc");

  if(type==="design"){
    title.innerHTML="Desain & Menggambar";
    desc.innerHTML="Saya memiliki kemampuan dalam menciptakan karya visual yang kreatif dan estetik.";
  } else {
    title.innerHTML="Public Speaking";
    desc.innerHTML="Berpengalaman menjadi MC dalam kegiatan formal LK 2 dengan percaya diri dan profesional.";
  }

  modal.style.display="flex";
  setTimeout(()=>modal.classList.add("show"),10);
}

function closeModal(){
  const modal = document.getElementById("modal");
  modal.classList.remove("show");
  setTimeout(()=>modal.style.display="none",300);
}
</script>

</body>
</html>
